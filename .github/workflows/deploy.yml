name: Deploy to Cloudflare

# Auto-deployer sitet ved push til main.
# Kræver GitHub secrets:
#   CLOUDFLARE_API_TOKEN (Workers Edit + Account Read)
#   TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID (fejl-alarm — tilføjet 2026-06-07
#   efter 13 dages ubemærket rød CI; botten publicerede uden at noget kom live)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'worker/**'
      - 'content/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  # Node 20-actions deprecates 2026-06-16 — opt-in til Node 24 nu
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install root dependencies (gray-matter til build-corpus.mjs)
        run: npm ci
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Telegram-alarm ved fejl
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE="${COMMIT_MSG%%$'\n'*}"
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="🔴 birkenborg.dev deploy FEJLEDE: ${FIRST_LINE:-manuel kørsel} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null
