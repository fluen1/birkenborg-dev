name: Lighthouse audit

on:
  schedule:
    - cron: '0 6 * * 1'  # mandag 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://birkenborg-dev.pages.dev
            https://birkenborg-dev.pages.dev/skrifter
            https://birkenborg-dev.pages.dev/projekter
            https://birkenborg-dev.pages.dev/cv
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
