name = "birkenborg-dev"
main = "worker/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node scripts/build-corpus.mjs"

[assets]
directory = "./site/dist"
binding = "ASSETS"

[[kv_namespaces]]
binding = "CHAT_STATE"
id = "a9e4d133b0174405accbdb594fa89b61"

# Workers Logs — uden denne er der INGEN produktion-logs at debugge med
# (fundet ved flåde-audit 2026-06-12: workeren havde 0 observability-events)
[observability]
enabled = true

[[routes]]
pattern = "birkenborg.dev"
custom_domain = true

[[routes]]
pattern = "www.birkenborg.dev"
custom_domain = true
