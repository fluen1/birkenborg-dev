name = "birkenborg-dev"
main = "worker/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node scripts/build-corpus.mjs"

[assets]
directory = "./site/dist"
binding = "ASSETS"

[[routes]]
pattern = "birkenborg.dev"
custom_domain = true

[[routes]]
pattern = "www.birkenborg.dev"
custom_domain = true
